  <!-- Fullscreen Modal -->
  <div id="imageModal" class="fixed inset-0 hidden opacity-0 transition-opacity duration-300 items-center justify-center z-50 bg-black bg-opacity-90">
    <button onclick="closeModal()" class="absolute top-4 right-4 bg-white text-black rounded-full p-2 shadow text-xl z-50">✖</button>
    <img id="modalImage" src="" alt="Full View" class="max-w-full max-h-[90vh] object-contain" />
  </div>

  <!-- Footer -->

  </footer>

  <!-- JS -->
  <script>
    function toggleMenu() {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    }

    function viewImage(src) {
      const modal = document.getElementById('imageModal');
      document.getElementById('modalImage').src = src;
      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.add('opacity-100'), 10);
    }

    function closeModal() {
      const modal = document.getElementById('imageModal');
      modal.classList.remove('opacity-100');
      setTimeout(() => modal.classList.add('hidden'), 300);
    }
  </script>
