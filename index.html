<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Designium Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-slate-100 to-gray-200 text-gray-800 min-h-screen">

  <!-- Navigation -->
  <nav class="bg-white shadow-lg">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500">
        The Designium Hub
      </h1>
      <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
      <ul class="hidden md:flex space-x-6 font-semibold">
        <li><a href="index.html" class="hover:text-pink-500 transition">Nature</a></li>
        <li><a href="bikes.html" class="hover:text-pink-500 transition">Bikes</a></li>
        <li><a href="cars.html" class="hover:text-pink-500 transition">Cars</a></li>
        <li><a href="games.html" class="hover:text-pink-500 transition">Games</a></li>
        <li><a href="photography.html" class="hover:text-pink-500 transition">Photography</a></li>
        <li><a href="movies.html" class="hover:text-pink-500 transition">Movies</a></li>
      </ul>
    </div>

    <div id="mobile-menu" class="md:hidden hidden px-4 pb-4">
      <ul class="space-y-2 font-semibold">
        <li><a href="index.html" class="block">Nature</a></li>
        <li><a href="bikes.html" class="block">Bikes</a></li>
        <li><a href="cars.html" class="block">Cars</a></li>
        <li><a href="games.html" class="block">Games</a></li>
        <li><a href="photography.html" class="block">Photography</a></li>
        <li><a href="movies.html" class="block">Movies</a></li>
      </ul>
    </div>
  </nav>

  <!-- Cards Section -->
  <main class="container mx-auto px-4 py-10 grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">

    <!-- Card Template (Repeat for each image) -->
    <!-- Example card - update src as needed -->
    <div class="relative group rounded-xl overflow-hidden shadow-xl">
      <img src="./image/nature/p1.jpg" alt="Nature 1" class="w-full h-64 object-cover" />
      <div class="absolute inset-0 bg-black bg-opacity-40 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition duration-300 flex flex-col justify-center items-center space-y-3 text-white">
        <button onclick="viewImage('./image/nature/p1.jpg')" class="bg-gradient-to-r from-pink-500 to-purple-600 px-5 py-2 rounded-full font-semibold hover:scale-105 transition">👁 View</button>
        <a href="./image/nature/p1.jpg" download class="bg-gradient-to-r from-green-400 to-lime-500 px-5 py-2 rounded-full font-semibold hover:scale-105 transition">⬇ Download</a>
      </div>
    </div>

    <!-- Repeat the above block and change the image path for each card -->
    <!-- Example with p2.jpg -->
    <div class="relative group rounded-xl overflow-hidden shadow-xl">
      <img src="./image/nature/p2.jpg" alt="Nature 2" class="w-full h-64 object-cover" />
      <div class="absolute inset-0 bg-black bg-opacity-40 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition duration-300 flex flex-col justify-center items-center space-y-3 text-white">
        <button onclick="viewImage('./image/nature/p2.jpg')" class="bg-gradient-to-r from-pink-500 to-purple-600 px-5 py-2 rounded-full font-semibold hover:scale-105 transition">👁 View</button>
        <a href="./image/nature/p2.jpg" download class="bg-gradient-to-r from-green-400 to-lime-500 px-5 py-2 rounded-full font-semibold hover:scale-105 transition">⬇ Download</a>
      </div>
    </div>

    <!-- Add more cards as needed (p3.jpg, p4.jpg, etc.) -->

  </main>

  <!-- Fullscreen Modal Viewer -->
  <div id="imageModal" class="fixed inset-0 hidden items-center justify-center z-50 bg-black bg-opacity-90 p-4">
    <button onclick="closeModal()" class="absolute top-4 right-4 bg-white text-black rounded-full p-2 shadow text-xl z-50">✖</button>
    <img id="modalImage" src="" alt="Full View" class="max-w-screen max-h-screen w-auto h-auto object-contain rounded-lg shadow-lg" />
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-gray-300 text-center py-6 mt-10 shadow-inner">
    &copy; 2025 The Designium Hub. All rights reserved.
  </footer>

  <!-- JavaScript -->
  <script>
    function toggleMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    }

    function viewImage(src) {
      const modal = document.getElementById('imageModal');
      const image = document.getElementById('modalImage');
      image.src = src;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('imageModal');
      modal.classList.remove('flex');
      modal.classList.add('hidden');
      document.getElementById('modalImage').src = ''; // Clear image
    }
  </script>

</body>
</html>
